schedule: '[[10000, "A"], [20000, "l"], [30000, "i"], [40000, "c"], [50000, "e"],
  [60000, "\n"]]'

source_code: |-
  (defvar done 0)
  (defvar started 0)

  (print_str "What is your name?\n")

  (defirq
      (defvar char (in 1))
      
      ; Если это первая буква, сначала здороваемся
      (if (= started 0)
          (setq started (print_str "Hello, "))
          0
      )
      
      ; Если пришел Enter (код 10), ставим флаг выхода
      (if (= char 10)
          (setq done (print_str "!\n"))
          (print_char char)
      )
  )

  (defun wait_loop ()
      (if (= done 0)
          (funcall wait_loop)
          0
      )
  )

  (funcall wait_loop)
