  (defvar sum 0)

  (defun euler (i)
      (if (= i 1000)
          0
          (if (= (mod i 3) 0)
              (+ i (funcall euler (+ i 1)))
              (if (= (mod i 5) 0)
                  (+ i (funcall euler (+ i 1)))
                  (funcall euler (+ i 1))
              )
          )
      )
  )

  (setq sum (funcall euler 1))
  (print sum)

