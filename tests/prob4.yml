source_code: |
  (defvar max_pal 0)

  (defun reverse_num (n rev)
      (if (= n 0)
          rev
          (funcall reverse_num (/ n 10) (+ (* rev 10) (mod n 10)))
      )
  )

  (defun inner_loop (i j)
      (if (< j 100)
          0
          (if (< (* i j) max_pal)
              0
              (if (= (funcall reverse_num (* i j) 0) (* i j))
                  (setq max_pal (* i j))
                  (funcall inner_loop i (- j 1))
              )
          )
      )
  )

  (defun outer_loop (i)
      (if (< i 100)
          0
          (if (< (* i 999) max_pal)
              0
              (funcall inner_loop i 999)
          )
      )
      
      (if (< i 100)
          0
          (if (< (* i 999) max_pal)
              0
              (funcall outer_loop (- i 1))
          )
      )
  )

  (funcall outer_loop 999)
  (print max_pal)

