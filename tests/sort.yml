schedule: '[[100, "\u0005"], [200, "E"], [300, "B"], [400, "D"], [500, "A"], [600,
  "C"]]'
source_code: |
  (defvar n 0)
  (defvar arr_base 5000)

  (defun wait_n ()
      (setq n (in 1))
      (if (= n 0)
          (funcall wait_n)
          0
      )
  )

  ; Блокирующее чтение одного символа и запись его в массив по смещению i
  (defun read_char (i)
      (defvar char 0)
      (setq char (in 1))
      (if (= char 0)
          (funcall read_char i)
          (write_ptr (+ arr_base i) char)
      )
  )

  (defun read_arr (i limit)
      (if (< i limit)
          (funcall read_char i)
          0
      )
      (if (< i limit)
          (funcall read_arr (+ i 1) limit)
          0
      )
  )

  (defun swap (j)
      (defvar temp 0)
      (setq temp (read_ptr (+ arr_base j)))
      (write_ptr (+ arr_base j) (read_ptr (+ arr_base (+ j 1))))
      (write_ptr (+ arr_base (+ j 1)) temp)
  )

  (defun bubble_inner (j limit)
      (if (< j limit)
          (if (> (read_ptr (+ arr_base j)) (read_ptr (+ arr_base (+ j 1))))
              (funcall swap j)
              0
          )
          0
      )
      (if (< j limit)
          (funcall bubble_inner (+ j 1) limit)
          0
      )
  )

  (defun bubble_outer (limit)
      (if (> limit 0)
          (funcall bubble_inner 0 limit)
          0
      )
      (if (> limit 0)
          (funcall bubble_outer (- limit 1))
          0
      )
  )

  (defun print_arr (i limit)
      (if (< i limit)
          (print_char (read_ptr (+ arr_base i)))
          0
      )
      (if (< i limit)
          (funcall print_arr (+ i 1) limit)
          0
      )
  )

  ; ОСНОВНАЯ ПРОГРАММА
  (funcall wait_n)
  (funcall read_arr 0 n)
  (funcall bubble_outer (- n 1))
  (funcall print_arr 0 n)

