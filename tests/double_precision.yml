source_code: |-
  (defvar a_hi 1000)
  (defvar a_lo 2000000)
  (defvar b_hi 3000)
  (defvar b_lo 1500000)
  (defvar limit 1000000) ; Наша "база" для имитации переполнения

  (defvar sum_lo (+ a_lo b_lo))
  (defvar carry 0)

  (defun check_carry ()
      (if (> sum_lo limit)
          (setq carry 1)
          (if (= sum_lo limit)
              (setq carry 1)
              0
          )
      )
  )

  (funcall check_carry)

  (if (= carry 1)
      (setq sum_lo (- sum_lo limit))
      0
  )

  (defvar sum_hi (+ (+ a_hi b_hi) carry))

  (print_str "High: ")
  (print sum_hi)
  (print_str " Low: ")
  (print sum_lo)
