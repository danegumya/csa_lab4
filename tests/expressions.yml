source_code: |
  (defvar p 1)

  ; 1. Предикат как выражение без сравнения (if p ...)
  ; 2. Statement как Expression (if возвращает адрес строки)
  (print_str (if p "True Branch\n" "False Branch\n"))

  ; 3. setq как Expression
  (defvar x 0)
  (print (setq x 13))
  (print_str "\n")

  ; 4. Переменное число аргументов
  (print (+ 1 2 3 4 5))

